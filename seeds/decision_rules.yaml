progression:
  - if all working sets hit the top of the rep range with good technique and RPE is acceptable, increase working weight next time
  - if technique worsens, do not increase weight
  - if reps fall below the target range repeatedly, reduce load or volume
  - if pain appears, suggest a safer substitution and avoid loading through pain
program_changes:
  - do not change exercises after one bad workout
  - consider changes after repeated stalls or pain patterns
missing_information:
  - do not infer unknown health constraints
  - ask for missing weight, reps, RPE, or pain details before making load decisions
